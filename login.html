<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - URL Shortener</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #07111f, #0f172a 45%, #1d4ed8);
        color: #f8fafc;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      .login-container {
        background: rgba(15, 23, 42, 0.8);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 16px;
        padding: 40px;
        width: 100%;
        max-width: 400px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        text-align: center;
        backdrop-filter: blur(10px);
      }
      h1 {
        margin-top: 0;
        font-size: 2rem;
        margin-bottom: 24px;
      }
      .input-group {
        margin-bottom: 20px;
        text-align: left;
      }
      .input-group label {
        display: block;
        margin-bottom: 8px;
        font-size: 0.9rem;
        color: #cbd5e1;
      }
      .input-group input {
        width: 100%;
        padding: 12px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        background: rgba(0, 0, 0, 0.2);
        color: white;
        font-size: 1rem;
        outline: none;
      }
      .input-group input:focus {
        border-color: #3b82f6;
      }
      .btn {
        width: 100%;
        padding: 14px;
        background: #2563eb;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 1.1rem;
        font-weight: bold;
        cursor: pointer;
        transition: background 0.3s;
      }
      .btn:hover {
        background: #1d4ed8;
      }
      .divider {
        display: flex;
        align-items: center;
        text-align: center;
        color: #94a3b8;
        font-size: 0.85rem;
        margin: 24px 0;
      }
      .divider::before, .divider::after {
        content: '';
        flex: 1;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }
      .divider span {
        padding: 0 10px;
      }
      .btn-guest {
        width: 100%;
        padding: 12px;
        background: transparent;
        color: #cbd5e1;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 8px;
        font-size: 1rem;
        cursor: pointer;
        transition: all 0.3s ease;
      }
      .btn-guest:hover {
        background: rgba(255, 255, 255, 0.05);
        border-color: #cbd5e1;
        color: white;
      }
      .error-message {
        color: #ef4444;
        background: rgba(239, 68, 68, 0.1);
        padding: 10px;
        border-radius: 6px;
        margin-bottom: 16px;
        font-size: 0.9rem;
        display: none;
      }
      .text-link {
        color: #60a5fa;
        cursor: pointer;
        font-size: 0.9rem;
        text-decoration: none;
        display: inline-block;
        margin-top: 15px;
      }
      .text-link:hover {
        text-decoration: underline;
      }
      .password-wrapper {
        position: relative;
        display: flex;
        align-items: center;
      }
      .password-wrapper input {
        padding-right: 40px; /* Space for the icon */
        margin-top: 0; /* Override default input margin */
      }
      /* Adjust label margin since we removed input margin */
      .input-group label.pw-label {
        margin-top: 15px;
        margin-bottom: 10px;
      }
      .toggle-password {
        position: absolute;
        right: 12px;
        background: none;
        border: none;
        color: #94a3b8;
        cursor: pointer;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .toggle-password:hover {
        color: #cbd5e1;
      }
      .toggle-password svg {
        width: 20px;
        height: 20px;
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <h1 id="formTitle">Welcome Back</h1>
      <p id="formSubtitle" style="color: #cbd5e1; margin-bottom: 24px;">Sign in to continue to URL Shortener</p>

      <div id="errorMessage" class="error-message"></div>

      <!-- Email Login Form -->
      <form id="emailLoginForm" class="input-group">
        <label for="loginEmail">Email Address</label>
        <input type="email" id="loginEmail" required placeholder="you@example.com" />
        
        <label for="loginPassword" class="pw-label">Password</label>
        <div class="password-wrapper">
          <input type="password" id="loginPassword" required placeholder="••••••••" />
          <button type="button" class="toggle-password" onclick="togglePassword('loginPassword', this)">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />
            </svg>
          </button>
        </div>
        
        <button type="submit" class="btn" style="margin-top: 20px;">Sign In</button>
        <div style="text-align: center;">
          <a class="text-link" id="showRegisterBtn">Don't have an account? Register</a>
        </div>
      </form>

      <!-- Registration Form (Hidden by default) -->
      <form id="registerForm" class="input-group hidden" style="display: none;">
        <label for="regName">Full Name</label>
        <input type="text" id="regName" required placeholder="John Doe" />

        <label for="regEmail" style="margin-top: 15px;">Email Address</label>
        <input type="email" id="regEmail" required placeholder="you@example.com" />
        
        <label for="regPassword" class="pw-label">Password</label>
        <div class="password-wrapper">
          <input type="password" id="regPassword" required placeholder="••••••••" />
          <button type="button" class="toggle-password" onclick="togglePassword('regPassword', this)">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />
            </svg>
          </button>
        </div>
        
        <button type="submit" class="btn" style="margin-top: 20px;">Create Account</button>
        <div style="text-align: center;">
          <a class="text-link" id="showLoginBtn">Already have an account? Sign in</a>
        </div>
      </form>

      <div class="divider">
        <span>OR</span>
      </div>
      
      <!-- Google Sign-In Element -->
      <div id="g_id_onload"
         data-client_id="43495009282-bdbsqq8og9g8goteea52q8cht3s9hd6k.apps.googleusercontent.com"
         data-context="signin"
         data-ux_mode="popup"
         data-callback="handleCredentialResponse"
         data-auto_prompt="false">
      </div>
      <div class="g_id_signin"
         style="display: flex; justify-content: center; margin-bottom: 15px;"
         data-type="standard"
         data-shape="rectangular"
         data-theme="filled_black"
         data-text="signin_with"
         data-size="large"
         data-logo_alignment="left">
      </div>

      <!-- Guest Login -->
      <button id="guestBtn" class="btn-guest">Continue as Guest</button>

    </div>

    <script>
      function parseJwt (token) {
        var base64Url = token.split('.')[1];
        var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
        var jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
            return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
        }).join(''));
        return JSON.parse(jsonPayload);
      }

      function handleCredentialResponse(response) {
        const responsePayload = parseJwt(response.credential);
        
        const userProfile = {
          name: responsePayload.name,
          email: responsePayload.email,
          picture: responsePayload.picture
        };
        sessionStorage.setItem('userProfile', JSON.stringify(userProfile));
        
        window.location.href = '/app';
      }

      const errorMessage = document.getElementById('errorMessage');
      const emailLoginForm = document.getElementById('emailLoginForm');
      const registerForm = document.getElementById('registerForm');
      const formTitle = document.getElementById('formTitle');
      const formSubtitle = document.getElementById('formSubtitle');

      function showError(msg) {
        errorMessage.textContent = msg;
        errorMessage.style.display = 'block';
      }

      function hideError() {
        errorMessage.style.display = 'none';
      }

      function togglePassword(inputId, btn) {
        const input = document.getElementById(inputId);
        const icon = btn.querySelector('svg');
        if (input.type === 'password') {
          input.type = 'text';
          // Open eye icon
          icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />';
        } else {
          input.type = 'password';
          // Closed eye icon
          icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />';
        }
      }

      document.getElementById('showRegisterBtn').addEventListener('click', () => {
        hideError();
        emailLoginForm.style.display = 'none';
        registerForm.style.display = 'block';
        formTitle.textContent = 'Create Account';
        formSubtitle.textContent = 'Sign up to manage your links';
      });

      document.getElementById('showLoginBtn').addEventListener('click', () => {
        hideError();
        registerForm.style.display = 'none';
        emailLoginForm.style.display = 'block';
        formTitle.textContent = 'Welcome Back';
        formSubtitle.textContent = 'Sign in to continue to URL Shortener';
      });

      // Email Login Handler (Backend Auth)
      emailLoginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        hideError();
        
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        const btn = e.target.querySelector('button');
        const oldText = btn.textContent;
        btn.textContent = 'Signing in...';
        btn.disabled = true;

        try {
          const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
          });
          const data = await res.json();

          if (!res.ok) throw new Error(data.error || 'Failed to login');

          const userProfile = {
            name: data.user.name,
            email: data.user.email,
            picture: `https://ui-avatars.com/api/?name=${encodeURIComponent(data.user.name)}&background=2563eb&color=fff&size=128`
          };
          sessionStorage.setItem('userProfile', JSON.stringify(userProfile));
          window.location.href = '/app';
        } catch (err) {
          showError(err.message);
          btn.textContent = oldText;
          btn.disabled = false;
        }
      });

      // Registration Handler (Backend Auth)
      registerForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        hideError();
        
        const name = document.getElementById('regName').value;
        const email = document.getElementById('regEmail').value;
        const password = document.getElementById('regPassword').value;
        const btn = e.target.querySelector('button');
        const oldText = btn.textContent;
        btn.textContent = 'Creating account...';
        btn.disabled = true;

        try {
          const res = await fetch('/api/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, email, password })
          });
          const data = await res.json();

          if (!res.ok) throw new Error(data.error || 'Failed to register');

          const userProfile = {
            name: data.user.name,
            email: data.user.email,
            picture: `https://ui-avatars.com/api/?name=${encodeURIComponent(data.user.name)}&background=2563eb&color=fff&size=128`
          };
          sessionStorage.setItem('userProfile', JSON.stringify(userProfile));
          window.location.href = '/app';
        } catch (err) {
          showError(err.message);
          btn.textContent = oldText;
          btn.disabled = false;
        }
      });

      // Guest Login Handler
      document.getElementById('guestBtn').addEventListener('click', () => {
        const userProfile = {
          name: 'Guest User',
          email: 'guest@example.com',
          picture: 'https://ui-avatars.com/api/?name=Guest&background=64748b&color=fff&size=128'
        };
        sessionStorage.setItem('userProfile', JSON.stringify(userProfile));
        window.location.href = '/app';
      });
    </script>
  </body>
</html>
