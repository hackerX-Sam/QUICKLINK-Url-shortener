<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>URL Shortener</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #07111f, #0f172a 45%, #1d4ed8);
        color: #f8fafc;
        overflow: hidden;
      }
      .intro {
        position: fixed;
        inset: 0;
        background: radial-gradient(circle, #1d4ed8 0%, #0f172a 70%);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 20;
        animation: fadeOut 1s ease forwards;
        animation-delay: 2s;
      }
      .intro .brand {
        display: inline-block;
        min-width: 9ch;
        font-size: clamp(2rem, 6vw, 3.5rem);
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        opacity: 0;
        transform: translateY(24px);
        animation: riseIn 1s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        animation-delay: 0.2s;
        white-space: nowrap;
        overflow: hidden;
        border-right: 2px solid rgba(255,255,255,0.9);
      }
      .main {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        opacity: 0;
        transform: translateY(18px);
        pointer-events: none;
        display: none;
      }
      .card {
        background: rgba(255,255,255,0.95);
        color: #0f172a;
        border-radius: 24px;
        box-shadow: 0 18px 55px rgba(0,0,0,0.25);
        padding: 36px;
        max-width: 760px;
        width: 100%;
      }
      .login-screen {
        position: fixed;
        inset: 0;
        background: rgba(2, 6, 23, 0.86);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 25;
        padding: 24px;
      }
      .login-card {
        background: white;
        color: #0f172a;
        border-radius: 20px;
        width: 100%;
        max-width: 420px;
        padding: 28px;
        box-shadow: 0 18px 50px rgba(0,0,0,0.24);
      }
      .login-card h2 { margin-top: 0; }
      .login-card p { margin-bottom: 16px; }
      .btn-google, .btn-email {
        width: 100%;
        padding: 12px 14px;
        border-radius: 10px;
        border: 1px solid #d1d5db;
        margin-top: 10px;
        cursor: pointer;
        font-size: 15px;
        background: white;
      }
      .btn-google { background: #fff; }
      .btn-email { background: #2563eb; color: white; border: none; }
      .divider {
        display: flex;
        align-items: center;
        gap: 10px;
        color: #64748b;
        margin: 14px 0;
      }
      .divider::before, .divider::after {
        content: '';
        flex: 1;
        height: 1px;
        background: #e2e8f0;
      }
      .login-form input {
        margin-top: 10px;
      }
      .hidden { display: none !important; }
      h1 { font-size: 2.2rem; margin-bottom: 10px; }
      p { font-size: 1rem; line-height: 1.6; color: #475569; }
      .grid { display: grid; gap: 20px; margin-top: 24px; }
      .panel {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        padding: 18px;
      }
      input, button {
        width: 100%;
        padding: 12px;
        margin-top: 10px;
        border-radius: 8px;
        border: 1px solid #cbd5e1;
        font-size: 16px;
      }
      button {
        background: #2563eb;
        color: white;
        border: none;
        cursor: pointer;
        transition: transform 0.2s ease, background 0.2s ease;
      }
      button:hover { background: #1d4ed8; transform: translateY(-1px); }
      #result {
        margin-top: 12px;
        padding: 12px;
        background: #eff6ff;
        border-radius: 8px;
        display: none;
      }
      .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
      .stat-card {
        background: white;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        padding: 12px;
        text-align: center;
      }
      .stat-card h4 { margin: 0 0 8px 0; font-size: 0.85rem; color: #64748b; }
      .stat-value { font-size: 1.4rem; font-weight: bold; color: #2563eb; }
      .features { display: grid; gap: 10px; margin-top: 10px; }
      .feature {
        background: white;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        padding: 10px 12px;
      }
      @keyframes riseIn {
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes fadeOut {
        0% { opacity: 1; visibility: visible; }
        100% { opacity: 0; visibility: hidden; }
      }
      @keyframes showMain {
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes blink {
        50% { border-color: transparent; }
      }
      .user-profile {
        position: absolute;
        top: 20px;
        right: 20px;
        display: flex;
        align-items: center;
        gap: 12px;
        background: rgba(15, 23, 42, 0.8);
        padding: 8px 16px;
        border-radius: 99px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        z-index: 50;
      }
      .user-profile img {
        width: 32px;
        height: 32px;
        border-radius: 50%;
      }
      .user-profile span {
        font-size: 0.9rem;
        font-weight: bold;
      }
      .btn-logout {
        background: rgba(255,255,255,0.1);
        color: white;
        border: none;
        padding: 6px 12px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 0.8rem;
        transition: background 0.2s;
        margin-left: 8px;
        width: auto;
      }
      .btn-logout:hover {
        background: rgba(255,255,255,0.2);
      }
    </style>
  </head>
  <body>
    <div id="userProfileContainer" class="user-profile" style="display: none;">
      <img id="userAvatar" src="" alt="Avatar" />
      <span id="userName">User</span>
      <button class="btn-logout" id="logoutBtn">Logout</button>
    </div>

    <div class="intro">
      <div class="brand">Quicklink</div>
    </div>

    <section class="main">
      <div class="card">
        <h1>Welcome to your URL Shortener</h1>
        <p>Create clean short links in seconds and share them effortlessly.</p>

        <div class="grid">
          <div class="panel">
            <h3>Shorten a link</h3>
            <input id="urlInput" type="url" placeholder="https://example.com" />
            <input id="aliasInput" type="text" placeholder="Optional custom alias" />
            <button id="shortenBtn">Shorten URL</button>
            <div id="result"></div>
          </div>

          <div class="panel">
            <h3>Analytics Dashboard</h3>
            <div class="stats-grid">
              <div class="stat-card">
                <h4>Visits</h4>
                <div id="statVisits" class="stat-value">-</div>
              </div>
              <div class="stat-card">
                <h4>URLs</h4>
                <div id="statUrls" class="stat-value">-</div>
              </div>
              <div class="stat-card">
                <h4>Clicks</h4>
                <div id="statClicks" class="stat-value">-</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <script>
      const shortenBtn = document.getElementById('shortenBtn');
      const urlInput = document.getElementById('urlInput');
      const aliasInput = document.getElementById('aliasInput');
      const resultBox = document.getElementById('result');
      const brand = document.querySelector('.brand');
      const mainSection = document.querySelector('.main');
      
      const userProfileContainer = document.getElementById('userProfileContainer');
      const userAvatar = document.getElementById('userAvatar');
      const userName = document.getElementById('userName');
      const logoutBtn = document.getElementById('logoutBtn');

      // Check session
      const userStr = sessionStorage.getItem('userProfile');
      if (!userStr) {
        window.location.href = '/login';
      } else {
        const user = JSON.parse(userStr);
        userAvatar.src = user.picture || 'https://via.placeholder.com/32';
        userName.textContent = user.name || 'User';
        userProfileContainer.style.display = 'flex';
      }

      logoutBtn.addEventListener('click', () => {
        sessionStorage.removeItem('userProfile');
        window.location.href = '/login';
      });

      const fullText = 'Quicklink';
      let index = 0;

      function typeBrand() {
        brand.textContent = fullText.slice(0, index);
        index += 1;
        if (index <= fullText.length) {
          setTimeout(typeBrand, 95);
        }
      }

      setTimeout(typeBrand, 300);

      window.addEventListener('load', () => {
        setTimeout(() => {
          document.querySelector('.intro').style.display = 'none';
          mainSection.style.display = 'flex';
          mainSection.style.pointerEvents = 'auto';
          mainSection.style.opacity = '1';
          mainSection.style.transform = 'translateY(0)';
          fetchDashboardStats();
        }, 2200);
      });

      async function fetchDashboardStats() {
        try {
          const res = await fetch('/api/analytics');
          const data = await res.json();
          document.getElementById('statVisits').textContent = data.totalVisits || 0;
          document.getElementById('statUrls').textContent = data.totalUrls || 0;
          document.getElementById('statClicks').textContent = data.totalClicks || 0;
        } catch (error) {
          console.error('Failed to fetch analytics', error);
        }
      }

      shortenBtn.addEventListener('click', async () => {
        const url = urlInput.value.trim();
        const alias = aliasInput.value.trim();

        if (!url) {
          resultBox.style.display = 'block';
          resultBox.textContent = 'Please enter a URL.';
          return;
        }

        resultBox.style.display = 'block';
        resultBox.textContent = 'Creating short link...';

        try {
          const response = await fetch('/api/shorten', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ url, alias: alias || undefined })
          });

          const data = await response.json();
          if (!response.ok) {
            throw new Error(data.error || 'Something went wrong');
          }

          resultBox.innerHTML = `<strong>Short link:</strong> <a href="${data.shortUrl}" target="_blank">${data.shortUrl}</a>`;
          fetchDashboardStats(); // refresh stats after shortening
        } catch (error) {
          resultBox.textContent = error.message;
        }
      });
    </script>
  </body>
</html>
